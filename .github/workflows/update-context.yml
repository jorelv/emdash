name: Update LLM Context

on:
  schedule:
    - cron: '0 * * * *' # runs every hour
  workflow_dispatch: # allows manual triggering from the Actions UI

permissions:
  contents: write

jobs:
  update-context:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Live Context
        run: |
          curl -s -o context.md https://emdash.jorelv.workers.dev/context.md

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add context.md
          if git diff --staged --quiet; then
            echo "No changes in context.md"
          else
            git commit -m "chore: update live LLM context.md"
            git push
          fi

      - name: Deploy to Cloudflare Pages
        run: |
          mkdir -p deploy-dir
          cp context.md deploy-dir/context.md
          cat > deploy-dir/index.html << 'HEREDOC'
          <!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>LLM Context</title></head>
          <body><p>Access the full site context at <a href="/context.md">/context.md</a></p></body></html>
          HEREDOC
          npx wrangler pages deploy deploy-dir --project-name jorelv-context --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
