name: Update LLM Context

on:
  schedule:
    - cron: '0 * * * *' # runs every hour
  workflow_dispatch: # allows manual triggering from the Actions UI

permissions:
  contents: write

jobs:
  update-context:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Live Context
        run: |
          curl -s -o context.md https://emdash.jorelv.workers.dev/context.md

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add context.md
          if git diff --staged --quiet; then
            echo "No changes in context.md"
          else
            git commit -m "chore: update live LLM context.md"
            git push
          fi
